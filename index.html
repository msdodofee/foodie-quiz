<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>你是哪种吃货？</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#fef9f0 0%,#fdf2e9 40%,#fce7d4 100%);background-attachment:fixed;color:#44403c;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.container{max-width:440px;margin:0 auto;padding:14px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* Cards */
.card{background:rgba(255,255,255,.92);border-radius:24px;padding:28px 20px;width:100%;box-shadow:0 4px 24px rgba(180,120,60,.08)}
.result-card{background:rgba(255,255,255,.92);border-radius:24px;padding:24px 18px;width:100%;box-shadow:0 4px 24px rgba(180,120,60,.10);text-align:center}

/* Typography */
.title{font-size:28px;font-weight:900;text-align:center;background:linear-gradient(135deg,#d97706,#e11d48,#9333ea);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px;line-height:1.3}
.subtitle{font-size:13px;color:#a8a29e;text-align:center;margin-top:5px}
.emoji-hero{font-size:64px;text-align:center;margin:14px 0;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* Buttons */
.btn{display:block;width:100%;padding:14px 18px;border:none;border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s ease;-webkit-tap-highlight-color:transparent;text-align:center;position:relative;overflow:hidden}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;box-shadow:0 4px 16px rgba(217,119,6,.25);margin-top:18px}
.btn-share{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 4px 16px rgba(16,185,129,.25)}
.btn-restart{background:#f5f5f4;color:#57534e}
.btn-group{display:flex;gap:8px;margin-top:18px}
.btn-group .btn{flex:1;margin-top:0}

/* Progress */
.progress-wrap{width:100%;padding:14px 0 8px;display:none}
.progress-bg{width:100%;height:6px;background:#e7e5e4;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#f59e0b,#e11d48);border-radius:3px;transition:width .4s ease}
.progress-text{font-size:10px;color:#a8a29e;text-align:center;margin-top:5px;font-weight:600}

/* Questions */
.q-num{font-size:11px;color:#d97706;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.q-text{font-size:17px;font-weight:700;line-height:1.5;margin-bottom:18px;color:#292524}
.options{display:flex;flex-direction:column;gap:8px}
.opt-btn{display:flex;align-items:center;gap:10px;padding:12px 14px;border:2px solid #e7e5e4;border-radius:14px;background:#fff;font-size:14px;cursor:pointer;transition:all .2s ease;text-align:left;color:#44403c;-webkit-tap-highlight-color:transparent}
.opt-btn:active{transform:scale(.97)}
.opt-btn.selected{border-color:#f59e0b;background:#fffbeb;box-shadow:0 0 0 3px rgba(245,158,11,.10)}
.opt-emoji{font-size:24px;flex-shrink:0}
.opt-label{line-height:1.4}

/* Result */
.res-avatar{margin:0 auto 10px;position:relative}
.res-avatar svg{width:130px;height:130px;filter:drop-shadow(0 3px 10px rgba(0,0,0,.06))}
.res-name{font-size:26px;font-weight:900;background:linear-gradient(135deg,#d97706,#e11d48);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.res-tag{display:inline-block;background:#fef3c7;color:#92400e;padding:3px 12px;border-radius:16px;font-size:11px;font-weight:700;margin:6px 0 12px}
.res-desc{font-size:14px;line-height:1.8;color:#44403c;text-align:left;background:#fefbf5;border-radius:14px;padding:16px 14px;margin:12px 0;border-left:4px solid #f59e0b}
.res-cuisines{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;margin:12px 0}
.cuisine-tag{background:#fffbeb;color:#d97706;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:600;border:1px solid #fde68a}
.res-quote{font-size:13px;font-style:italic;color:#78716c;margin:10px 0;line-height:1.6}

/* Loading */
.loading-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.spinner{width:40px;height:40px;border:4px solid #fef3c7;border-top:4px solid #f59e0b;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:#78716c;font-weight:500}
.loading-emoji{font-size:40px;animation:float 1.5s ease-in-out infinite}

/* Toast */
.toast{position:fixed;bottom:50px;left:50%;transform:translateX(-50%) translateY(120px);background:#1c1917;color:#fff;padding:10px 22px;border-radius:12px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s ease;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Screen system */
.screen{display:none;width:100%;flex-direction:column;align-items:center}
.screen.active{display:flex}
.fadeIn{animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Flags banner */
.flag-banner{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;margin:10px 0}
.flag-badge{background:#fff;border:1.5px solid #fde68a;border-radius:12px;padding:3px 8px;font-size:12px;font-weight:600}

/* Confetti */
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99}
.confetti-piece{position:absolute;animation:confettiFall 2s ease-out forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-20px) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

@media(max-width:380px){
  .container{padding:8px}
  .card,.result-card{padding:20px 12px}
  .title{font-size:24px}
  .q-text{font-size:15px}
  .opt-btn{padding:10px 12px;font-size:13px}
}
</style>
</head>
<body>

<div class="container" id="app">

  <!-- Welcome -->
  <div class="screen active" id="sc-welcome">
    <div class="card fadeIn">
      <div class="emoji-hero">🍽️</div>
      <div class="title">你是哪种吃货？</div>
      <div class="subtitle">16道灵魂拷问 · 28种吃货人格</div>
      <div class="subtitle" style="color:#d97706">测测你属于哪一种 🧬</div>
      <div class="flag-banner">
        <span class="flag-badge">🌶️ 辣</span><span class="flag-badge">🍣 鲜</span><span class="flag-badge">🍖 肉</span>
        <span class="flag-badge">🍜 面</span><span class="flag-badge">🍰 甜</span><span class="flag-badge">🌏 混</span><span class="flag-badge">🥗 简</span>
      </div>
      <button class="btn btn-primary" onclick="start()">开始测试 🍜</button>
    </div>
  </div>

  <!-- Quiz -->
  <div class="screen" id="sc-quiz">
    <div class="progress-wrap" id="progress-bar">
      <div class="progress-bg"><div class="progress-fill" id="pf" style="width:6.25%"></div></div>
      <div class="progress-text" id="pt">1 / 16</div>
    </div>
    <div class="card fadeIn" id="qc">
      <div class="q-num" id="qn"></div>
      <div class="q-text" id="qt"></div>
      <div class="options" id="qo"></div>
    </div>
  </div>

  <!-- Loading -->
  <div class="screen" id="sc-loading">
    <div class="loading-wrap">
      <div class="loading-emoji">🔍</div><div class="spinner"></div>
      <div class="loading-text" id="lt">正在分析你的味觉基因…</div>
    </div>
  </div>

  <!-- Result -->
  <div class="screen" id="sc-result">
    <div class="result-card fadeIn" id="rc"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="confetti-wrap" id="confetti"></div>

<script>
// =========== 7 TYPES × 4 PERSONALITIES = 28 COMBOS ===========
const TYPE_META = {
  spicy: {name:'🌶️ 辣魂觉醒', emoji:'🌶️', color:'#ef4444', bg:'#fff1f2', accent:'#dc2626', icon:'🌶️'},
  fresh: {name:'🍣 鲜味至臻', emoji:'🍣', color:'#06b6d4', bg:'#ecfeff', accent:'#0891b2', icon:'🍣'},

  carb:  {name:'🍜 碳水教父', emoji:'🍜', color:'#ca8a04', bg:'#fefce8', accent:'#a16207', icon:'🍜'},
  sweet: {name:'🍰 甜味至上', emoji:'🍰', color:'#ec4899', bg:'#fdf2f8', accent:'#db2777', icon:'🍰'},
  globe: {name:'🌏 世界食者', emoji:'🌍', color:'#8b5cf6', bg:'#f5f3ff', accent:'#7c3aed', icon:'🌍'},
  easy:  {name:'🥗 佛系淡食', emoji:'🥗', color:'#84cc16', bg:'#f7fee7', accent:'#65a30d', icon:'🥗'}

  radical:{name:'激进型', emoji:'⚡', desc:'走极端、不妥协、全速前进'},
  scholar:{name:'学术型', emoji:'🧐', desc:'研究党、数据控、知其所以然'},

// 28 results
const RESULTS = {
  spicy_radical: {
    title:'辣椒特种兵', tag:'川湘驻外武官', cuisines:'川菜🌶️ 湘菜🔥 墨西哥🌮 泰国冬阴功🍜',
    desc:'你的人生没有"微辣"这个选项。你的背包里永远装着便携辣酱，日本拉面选了"极辛"毫无感觉。<br><br>医生劝你少吃辣，你反问："川渝胃癌发病率更低，这您知道吧？"<br><br>终极梦想：去墨西哥亡灵节，跟当地人比拼魔鬼椒。',

  },

    desc:'你能说出200种辣椒名字，知道二荆条增香、小米辣添劲。朋友吃火锅不敢在你面前乱调蘸料——怕被辣度评分体系教育。<br><br>你的快乐：发现一种从没吃过的辣椒，花整个周末研究它。',

  spicy_social: {

    desc:'你的人生信条：没有什么是一顿火锅解决不了的。你有个"火锅群"五十多人，每月至少组织一次"辣度挑战赛"。<br><br>走进火锅店，服务员主动问："还是老样子？"你是朋友圈公认的火锅局发起人。',

  },

    title:'超然辣味仙', tag:'佛系吃辣人', cuisines:'川菜🌶️ 湘菜🔥 麻辣拌🥗 泡椒凤爪🐔',

  fresh_radical: {

    desc:'你能闻出海鲜市场哪家是当天凌晨进的货。鸡刚下蛋你就去拿，蔬菜叶子上的露水还在不在是你的购买标准。<br><br>吃过一次隔夜刺身，之后三天没睡着。朋友觉得你太讲究，但找你推荐餐厅从没差评。',

  return `<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id="grad" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="${b}"/><stop offset="100%" stop-color="${c}" stop-opacity=".12"/></radialGradient></defs>
    <rect width="140" height="140" fill="url(#grad)" rx="60"/>
    ${tf.body}
    ${extra}
    ${eyes}
    ${mouth}
    ${tf.accessory}
  </svg>`;
}

// =========== GAME STATE ===========
let typeScores = {spicy:0,fresh:0,meat:0,carb:0,sweet:0,globe:0,easy:0};
let persScores = {radical:0,scholar:0,social:0,zen:0};
let currentQ = 0;
const TQ = QUESTIONS.length;

const $ = id => document.getElementById(id);
function showSc(id){
  ['welcome','quiz','loading','result'].forEach(s => $('sc-'+s).classList.remove('active'));
  $('sc-'+id).classList.add('active');
}
function toast(m){
  const t = $('toast'); t.textContent = m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function confetti(){
  const wrap = $('confetti'); wrap.innerHTML = '';
  const emojis = ['🍕','🍔','🌮','🍣','🍩','🧁','🍜','🌶️','🍖','🍰','🧋','🍪','🥟','🍿','🍦','🥐'];
  for(let i=0;i<40;i++){
    const p = document.createElement('div'); p.className = 'confetti-piece';
    p.style.left = Math.random()*100+'%';
    p.style.top = -(Math.random()*30+10)+'px';
    p.style.fontSize = (14+Math.random()*18)+'px';
    p.textContent = emojis[i%emojis.length];
    p.style.animationDelay = Math.random()*1.2+'s';
    p.style.animationDuration = (1.5+Math.random()*1.5)+'s';
    wrap.appendChild(p);
  }
}

// =========== START ===========
function start(){
  typeScores = {spicy:0,fresh:0,meat:0,carb:0,sweet:0,globe:0,easy:0};
  persScores = {radical:0,scholar:0,social:0,zen:0};
  currentQ = 0;
  showSc('quiz');
  $('progress-bar').style.display = 'block';
  renderQ();
}

// =========== RENDER QUESTION ===========
function renderQ(){
  const q = QUESTIONS[currentQ];
  $('pf').style.width = ((currentQ+1)/TQ*100)+'%';
  $('pt').textContent = (currentQ+1)+' / '+TQ;
  $('qn').textContent = '第'+(currentQ+1)+'题';
  $('qt').textContent = q.q;
  const cont = $('qo'); cont.innerHTML = '';
  q.opts.forEach((o,i) => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.style.animation = 'fadeIn .35s ease '+i*0.07+'s both';
    b.innerHTML = '<span class="opt-emoji">'+o.e+'</span><span class="opt-label">'+o.t+'</span>';
    b.onclick = () => select(o.tk,o.pk,b);
    cont.appendChild(b);
  });
  $('qc').style.animation = 'none';
  requestAnimationFrame(() => { $('qc').style.animation = 'fadeIn .3s ease' });
}
function select(tk,pk,btn){
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  btn.classList.add('selected');
  typeScores[tk]++; persScores[pk]++;
  setTimeout(()=>{
    currentQ++;
    if(currentQ < TQ) renderQ(); else showResult();
  },350);
}

// =========== SHOW RESULT ===========
function showResult(){
  showSc('loading'); $('progress-bar').style.display = 'none';
  const lts = ['扫描外卖订单记录…','分析味觉基因…','计算奶茶含糖量…','评估碳水摄入模式…','比对国际美食频率…','鉴定吃货人格中…'];
  let i = 0; const iv = setInterval(()=>{ $('lt').textContent = lts[i=(i+1)%lts.length] },700);

  setTimeout(()=>{
    clearInterval(iv);
    let bestT='spicy', bestS=0;
    for(const [k,v] of Object.entries(typeScores)){ if(v>bestS){ bestS=v; bestT=k } }
    const tiesT = Object.entries(typeScores).filter(([,v])=>v===bestS).map(([k])=>k);
    const topT = tiesT[Math.floor(Math.random()*tiesT.length)];

    let bestP='radical', bestS2=0;
    for(const [k,v] of Object.entries(persScores)){ if(v>bestS2){ bestS2=v; bestP=k } }
    const tiesP = Object.entries(persScores).filter(([,v])=>v===bestS2).map(([k])=>k);
    const topP = tiesP[Math.floor(Math.random()*tiesP.length)];

    const key = topT+'_'+topP;
    const r = RESULTS[key] || RESULTS[topT+'_zen'] || RESULTS['easy_zen'];
    renderResult(topT,topP,r);
    showSc('result');
    confetti();
  },2000);
}

function renderResult(tk,pk,r){
  const tm = TYPE_META[tk], pm = PERS_META[pk];
  const tags = r.cuisines.split(' ').map(c => '<span class="cuisine-tag">'+c+'</span>').join('');
  $('rc').innerHTML = `
    <div class="res-avatar">${makeSvg(tk,pk)}</div>
    <div class="res-name">${r.title}</div>
    <div class="res-tag">${r.tag}</div>
    <div class="res-desc">${r.desc}</div>
    <div class="res-cuisines">${tags}</div>
    <div class="res-quote">「${r.quote}」</div>
    <div style="margin-top:12px;font-size:12px;color:#a8a29e">${tm.name} × ${pm.name} ${pm.emoji}</div>
    <div class="btn-group">
      <button class="btn btn-restart" onclick="start()">🔄 再测一次</button>
      <button class="btn btn-share" onclick="shareRes('${tk}','${pk}')">📤 分享结果</button>
    </div>`;
}

// =========== SHARE (includes URL) ===========
function shareRes(tk,pk){
  const key = tk+'_'+pk;
  const r = RESULTS[key] || RESULTS[tk+'_zen'] || RESULTS['easy_zen'];
  const txt = `🍽️ 我是【${r.title}】——${r.tag}\n\n「${r.quote}」\n\n测测你是哪种吃货？28种人格等你来鉴定！\n👉 https://msdodofee.github.io/foodie-quiz/`;
  const url = 'https://msdodofee.github.io/foodie-quiz/';
  if(navigator.share){
    navigator.share({title:'你是哪种吃货？',text:txt,url}).catch(()=>{})
  } else {
    if(navigator.clipboard){
      navigator.clipboard.writeText(txt).then(()=>toast('✅ 文案已复制，发给朋友吧！'))
    } else {
      const ta = document.createElement('textarea');
      ta.value = txt;
      ta.style.cssText = 'position:fixed;left:-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      toast('✅ 文案已复制，发给朋友吧！')
    }
  }
}
</script>
</body>
</html>
