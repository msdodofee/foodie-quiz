<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>你是哪种吃货？</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#fff7ed 0%,#fef3c7 30%,#fde68a 65%,#f59e0b 100%);background-attachment:fixed;color:#1c1917;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.container{max-width:440px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* Cards */
.card{background:rgba(255,255,255,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:28px;padding:32px 22px;width:100%;box-shadow:0 8px 40px rgba(146,64,14,.10)}
.result-card{background:rgba(255,255,255,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:28px;padding:28px 20px;width:100%;box-shadow:0 8px 40px rgba(146,64,14,.12);text-align:center}

/* Typography */
.title{font-size:30px;font-weight:900;text-align:center;background:linear-gradient(135deg,#ea580c,#dc2626,#c026d3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px}
.subtitle{font-size:14px;color:#78716c;text-align:center;margin-top:6px}
.emoji-hero{font-size:72px;text-align:center;margin:16px 0;animation:float 2.5s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* Buttons */
.btn{display:block;width:100%;padding:15px 20px;border:none;border-radius:18px;font-size:17px;font-weight:700;cursor:pointer;transition:all .2s ease;-webkit-tap-highlight-color:transparent;text-align:center;position:relative;overflow:hidden}
.btn:active{transform:scale(.95)}
.btn-primary{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;box-shadow:0 4px 18px rgba(234,88,12,.30);margin-top:20px}
.btn-share{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 4px 18px rgba(16,185,129,.30)}
.btn-restart{background:#f5f5f4;color:#44403c}
.btn-group{display:flex;gap:10px;margin-top:20px}
.btn-group .btn{flex:1;margin-top:0}

/* Progress */
.progress-wrap{width:100%;padding:16px 0 10px;display:none}
.progress-bg{width:100%;height:8px;background:#e7e5e4;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#f97316,#ea580c);border-radius:4px;transition:width .4s ease}
.progress-text{font-size:11px;color:#a8a29e;text-align:center;margin-top:6px;font-weight:600}

/* Questions */
.q-num{font-size:12px;color:#f97316;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.q-text{font-size:19px;font-weight:700;line-height:1.5;margin-bottom:22px;color:#1c1917}
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{display:flex;align-items:center;gap:12px;padding:14px 18px;border:2px solid #e7e5e4;border-radius:16px;background:#fff;font-size:15px;cursor:pointer;transition:all .2s ease;text-align:left;color:#44403c;-webkit-tap-highlight-color:transparent}
.opt-btn:active{transform:scale(.97)}
.opt-btn.selected{border-color:#f97316;background:#fff7ed;box-shadow:0 0 0 3px rgba(249,115,22,.12)}
.opt-emoji{font-size:26px;flex-shrink:0}
.opt-label{line-height:1.4}

/* Result */
.res-avatar{margin:0 auto 12px;position:relative}
.res-avatar svg{width:140px;height:140px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.08))}
.res-name{font-size:30px;font-weight:900;background:linear-gradient(135deg,#ea580c,#c026d3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.res-tag{display:inline-block;background:#fef3c7;color:#92400e;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;margin:8px 0 14px}
.res-desc{font-size:15px;line-height:1.8;color:#44403c;text-align:left;background:#fafaf9;border-radius:16px;padding:18px 16px;margin:14px 0;border-left:4px solid #f97316}
.res-cuisines{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin:14px 0}
.cuisine-tag{background:#fff7ed;color:#ea580c;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid #fed7aa}
.res-quote{font-size:14px;font-style:italic;color:#78716c;margin:12px 0;line-height:1.6}

/* Loading */
.loading-wrap{display:flex;flex-direction:column;align-items:center;gap:18px}
.spinner{width:44px;height:44px;border:4px solid #fef3c7;border-top:4px solid #f97316;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:15px;color:#78716c;font-weight:500}
.loading-emoji{font-size:44px;animation:float 1.5s ease-in-out infinite}

/* Toast */
.toast{position:fixed;bottom:50px;left:50%;transform:translateX(-50%) translateY(120px);background:#1c1917;color:#fff;padding:12px 26px;border-radius:14px;font-size:14px;font-weight:500;z-index:999;transition:transform .3s ease;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Screen system */
.screen{display:none;width:100%;flex-direction:column;align-items:center}
.screen.active{display:flex}
.fadeIn{animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Flags banner */
.flag-banner{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin:12px 0}
.flag-badge{background:#fff;border:2px solid #fef3c7;border-radius:14px;padding:4px 10px;font-size:13px;font-weight:600}

/* Confetti */
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99}
.confetti-piece{position:absolute;animation:confettiFall 2s ease-out forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-20px) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

@media(max-width:380px){
  .container{padding:10px}
  .card,.result-card{padding:24px 14px}
  .title{font-size:26px}
  .q-text{font-size:17px}
  .opt-btn{padding:12px 14px;font-size:14px}
}
</style>
</head>
<body>

<div class="container" id="app">

  <!-- Welcome -->
  <div class="screen active" id="sc-welcome">
    <div class="card fadeIn">
      <div class="emoji-hero">🍽️</div>
      <div class="title">你是哪种吃货？</div>
      <div class="subtitle">16道灵魂拷问 · 24种吃货人格</div>
      <div class="subtitle" style="color:#d97706">中外菜系混搭 · 测测你属于哪一种 🧬</div>
      <div class="flag-banner">
        <span class="flag-badge">🌶️ 辣</span><span class="flag-badge">🍣 鲜</span><span class="flag-badge">🍖 肉</span>
        <span class="flag-badge">🍜 面</span><span class="flag-badge">🍰 甜</span><span class="flag-badge">🌏 混</span>
      </div>
      <button class="btn btn-primary" onclick="start()">开始测试 🍜</button>
    </div>
  </div>

  <!-- Quiz -->
  <div class="screen" id="sc-quiz">
    <div class="progress-wrap" id="progress-bar">
      <div class="progress-bg"><div class="progress-fill" id="pf" style="width:6.25%"></div></div>
      <div class="progress-text" id="pt">1 / 16</div>
    </div>
    <div class="card fadeIn" id="qc">
      <div class="q-num" id="qn"></div>
      <div class="q-text" id="qt"></div>
      <div class="options" id="qo"></div>
    </div>
  </div>

  <!-- Loading -->
  <div class="screen" id="sc-loading">
    <div class="loading-wrap">
      <div class="loading-emoji">🔍</div><div class="spinner"></div>
      <div class="loading-text" id="lt">正在分析你的味觉基因…</div>
    </div>
  </div>

  <!-- Result -->
  <div class="screen" id="sc-result">
    <div class="result-card fadeIn" id="rc"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="confetti-wrap" id="confetti"></div>

<script>
// ============ 6 TYPES × 4 PERSONALITIES = 24 COMBOS ============
const TYPE_META = {
  spicy: {name:'🌶️ 辣魂觉醒', emoji:'🌶️', color:'#ef4444', bg:'#fef2f2', accent:'#dc2626', icon:'🌶️'},
  fresh: {name:'🍣 鲜味至臻', emoji:'🍣', color:'#06b6d4', bg:'#ecfeff', accent:'#0891b2', icon:'🍣'},
  meat:  {name:'🍖 肉食暴君', emoji:'🍖', color:'#d97706', bg:'#fffbeb', accent:'#b45309', icon:'🍖'},
  carb:  {name:'🍜 碳水教父', emoji:'🍜', color:'#eab308', bg:'#fefce8', accent:'#ca8a04', icon:'🍜'},
  sweet: {name:'🍰 甜味至上', emoji:'🍰', color:'#ec4899', bg:'#fdf2f8', accent:'#db2777', icon:'🍰'},
  globe: {name:'🌏 世界食者', emoji:'🌏', color:'#8b5cf6', bg:'#f5f3ff', accent:'#7c3aed', icon:'🌍'}
};
const PERS_META = {
  radical:{name:'激进型', emoji:'⚡', desc:'走极端、不妥协、全速前进'},
  scholar:{name:'学术型', emoji:'🧐', desc:'研究党、数据控、知其所以然'},
  social: {name:'社交型', emoji:'🎉', desc:'吃是社交货币，独乐乐不如众乐乐'},
  zen:    {name:'佛系型', emoji:'😌', desc:'来都来了，吃就完了，都行'}
};

// 24 results: key = "type_pers"
const RESULTS = {
  spicy_radical: {
    title:'辣椒特种兵', tag:'川湘驻外武官', cuisines:'川菜🌶️ 湘菜🔥 墨西哥🇲🇽 泰国冬阴功🍜 印度咖喱🍛',
    desc:'你的人生没有"微辣"这个选项。你的背包里永远装着便携辣酱，去日本旅游最大的文化冲击是拉面选了"极辛"之后毫无感觉。<br><br>朋友说你是一颗行走的朝天椒——走到哪里就辣到哪里。医生建议你少吃辣，你反问："川渝地区胃癌发病率反而更低，这个您知道吧？"<br><br>你的终极梦想：去墨西哥亡灵节，跟当地人比拼谁更能扛魔鬼椒。',
    quote:'"不放辣椒的菜，不配叫菜。"'
  },
  spicy_scholar: {
    title:'香辛料研究员', tag:'辣椒风味图谱作者', cuisines:'川菜🌶️ 湘菜🔥 贵州酸辣🥘 云南蘸水🌿 墨西哥🇲🇽',
    desc:'你能说出200种辣椒的名字，还能告诉你每种最适合做什么菜。你知道二荆条增香、子弹头提色、小米辣添劲，每种辣椒在你的厨房里各司其职。<br><br>你研究过花椒的麻度与温度的关系曲线，做过不同产地干辣椒的色差值对比。朋友吃火锅时都不敢在你面前乱调蘸料——怕被你的辣度评分体系教育。<br><br>你的快乐是：发现一种从没吃过的辣椒，然后花一整个周末研究怎么用它。',
    quote:'"辣不是痛觉，是一门可以量化的科学。"'
  },
  spicy_social: {
    title:'火锅召集官', tag:'社交型吃辣人格', cuisines:'重庆火锅🍲 串串香🍢 麻辣香锅🥘 江湖菜🍗 黔东南酸汤🐟',
    desc:'你的人生信条：没有什么是一顿火锅解决不了的，如果有，就两顿。你有一个"火锅群"，里面有五十多个人，你每月至少组织一次"全员辣度挑战赛"。<br><br>你走进火锅店，服务员会主动问："还是老样子？"你是朋友圈里公认的"火锅局的发起人"——没人比你更懂哪家店的鸭血最新鲜、毛肚最脆、脑花处理得最好。<br><br>你的超能力：永远能凑够一桌吃火锅的人。',
    quote:'"今晚吃火锅，来的扣1。一秒满桌。"'
  },
  spicy_zen: {
    title:'超然辣味仙', tag:'佛系吃辣人', cuisines:'川菜🌶️ 湘菜🔥 麻辣拌🥗 泡椒凤爪🐔 酸辣粉🍜',
    desc:'你已经过了"不辣不吃饭"的狂热阶段，进入了一种更高境界：辣也行，不辣也行，但恰好世界上辣的东西比较多，所以你看起来还是在吃辣。<br><br>你点菜时会说"微辣"，不是因为不能吃，是因为你早已看透——真正的辣不在嘴里，在灵魂。别人吃完满头大汗狂喝水，你微微一笑继续夹菜。<br><br>你的哲学：辣是一种选择，不是一种执念。随缘。',
    quote:'"微辣就好。心意到了，辣自然就到了。"'
  },

  fresh_radical: {
    title:'食材神探', tag:'鲜度狂热者', cuisines:'粤菜🥟 潮汕菜🦐 日料🍣 淮扬菜🥟 地中海料理🫒',
    desc:'你能闻出海鲜市场的哪家铺子是当天凌晨进的货。你买蔬菜的标准不是价格，是叶子上的露水还在不在。你追着渔船跑，鸡刚下蛋你就去拿。<br><br>你吃过一次隔夜的刺身，之后三天没睡着觉。你对不新鲜的东西有生理性排斥——这是一种天赋，也是一种诅咒。<br><br>你的朋友们觉得你"太讲究"，但每次找你推荐餐厅，没有一个差评。',
    quote:'"食材不会说谎，它就是菜的灵魂。"'
  },
  fresh_scholar: {
    title:'味觉科学家', tag:'鲜味解码人', cuisines:'粤菜🥟 日料🍣 潮汕生腌🦀 法餐🥂 怀石料理🍵',
    desc:'你能吃出今天的金枪鱼是长崎产的还是青森产的——不是因为你看过菜单，是你真的能。你研究过不同季节海鲜的脂肪酸含量变化，画过味觉感受曲线图。<br><br>你知道清蒸一条鱼的精确时间应该是水开后7分32秒（取决于鱼的大小和厚度）。你家的厨房里有十个定时器，而你用得非常自然。<br><br>你的朋友觉得你吃饭比实验室还科学，但他们还是会乖乖等你的推荐。',
    quote:'"鲜不是形容词，是一个可以用数据描述的客观量。"'
  },
  fresh_social: {
    title:'米其林向导', tag:'精致饭局发起人', cuisines:'粤菜🥟 日料🍣 新中式融合菜🥢 法餐🥂 私房菜🏠',
    desc:'你的手机里存了200多家餐厅，按菜系、场景、预算分门别类。朋友约饭前都会先问你："有没有推荐？人均不要超过500但要看着像人均1500的那种。"<br><br>你能记住每家餐厅的主厨名字，知道什么时候去能吃到当日特供。你对预订技巧了如指掌，热门店提前排队的攻略写满了备忘录。<br><br>你不是在吃饭，就是在帮别人安排吃饭的路上。',
    quote:'"约饭别问了，我直接发你链接。"'
  },
  fresh_zen: {
    title:'淡然知味人', tag:'清欢派美食家', cuisines:'粤菜🥟 日式定食🍱 清粥小菜🥣 潮汕打冷🦀 地中海沙拉🥗',
    desc:'你已经过了追求"omakase"的阶段。一碗白粥配一碟潮汕菜脯，你也能吃得津津有味。你不需要昂贵的食材来证明自己懂吃。<br><br>你知道最好的味道往往藏在最简单的食物里。白水煮菜能尝出清甜，是因为你舌头的灵敏度已经修炼到不需要任何遮掩。<br><br>朋友们笑你"太清淡"，但每次他们吃伤了，都来找你讨一碗清粥。',
    quote:'"人间至味，是清欢。"'
  },

  meat_radical: {
    title:'饕餮转世', tag:'大胃王认证', cuisines:'东北菜🥘 新疆大盘鸡🍗 巴西烤肉🥩 德州BBQ🍖 韩国烤肉🇰🇷',
    desc:'自助餐厅听到你的名字会临时改招牌——"今日已满"。你能一个人干掉半只烤全羊，服务员以为你是三人份，你说"是三个人吗？我一个人就够了。"<br><br>你的字典里没有"吃不下"，只有"等一下再来"。你第一次去东北吃铁锅炖的时候差点掉眼泪——"原来我这辈子一直在将就。"<br><br>你的人生哲学：肉管够，其他的都好说。',
    quote:'"小份？那不是菜，那叫试吃装。"'
  },
  meat_scholar: {
    title:'烤肉工程师', tag:'蛋白质精算师', cuisines:'东北菜🥘 烤肉🍖 德州BBQ🥩 蒙古烤肉🔥 西班牙火腿🍖',
    desc:'你知道每块肉的肌纤维走向、最佳烹饪温度和翻面时机。你的烤肉计时精确到秒，温控比航天局的还严格。你能用肉眼判断一块和牛的BMS等级。<br><br>你研究过美拉德反应的最佳条件，做过不同腌料对肉质影响的对照实验。朋友怕跟你吃烤肉——因为你会全程指导，翻面必须按你的指令。<br><br>但没人能否认：你烤出来的肉确实是最好吃的。',
    quote:'"烤肉不是烹饪，是化学实验。"'
  },
  meat_social: {
    title:'撸串大祭司', tag:'夜宵组织部长', cuisines:'东北烧烤🍢 新疆烤肉🔥 啤酒撸串🍺 韩国烤肉🇰🇷 大排档文化🍻',
    desc:'你的微信群名叫"今晚撸串"，群成员是你微信好友的70%。你能凭直觉判断一串羊肉是不是现切现穿，吃一口就知道老板用了多少孜然和辣椒面。<br><br>你掌握的技能：用瓶盖开啤酒、烤串串得又快又好、喝到凌晨四点还能正常回家。你是朋友心中的"夜宵之王"——没人比你更懂深夜的烟火气。<br><br>你的名言：啤的白的红的，谁走谁孙子。',
    quote:'"串在人就在，江湖就在。"'
  },
  meat_zen: {
    title:'食肉弥勒', tag:'来者不拒型', cuisines:'东北菜🥘 食堂红烧肉🍖 快餐汉堡🍔 烤串🍢 妈妈做的炖肉🥩',
    desc:'你对肉没有执念但每顿都有肉。自助餐吃回本了也不撑——因为你根本不算计，开心就好。食堂红烧肉和米其林牛排在你嘴里没有高低之分，都是肉，都好吃。<br><br>你已经过了"非A5和牛不吃"的阶段。便利店的炸鸡排、街边的烤肠、妈妈炖的排骨——每一个都是你心中的comfort food。<br><br>有人问："你吃过最好吃的肉是什么？"你想了想说："都挺好吃的。"',
    quote:'"吃肉嘛，开心最重要。"'
  },

  const c = tm.color, a = tm.accent, b = tm.bg;

  // Base face features per type
  const typeFeatures = {
    spicy: {body:'<circle cx="70" cy="75" r="55" fill="'+c+'" opacity=".15"/><circle cx="70" cy="72" r="48" fill="'+c+'"/><ellipse cx="70" cy="130" rx="42" ry="18" fill="'+a+'" opacity=".2"/>', accessory:'<text x="70" y="78" text-anchor="middle" font-size="46">🌶️</text>', cheek:'#fca5a5'},
    fresh: {body:'<circle cx="70" cy="75" r="55" fill="'+c+'" opacity=".10"/><circle cx="70" cy="72" r="48" fill="'+c+'"/><ellipse cx="70" cy="130" rx="42" ry="18" fill="'+a+'" opacity=".2"/>', accessory:'<text x="70" y="78" text-anchor="middle" font-size="44">🍣</text>', cheek:'#a5f3fc'},
    meat:  {body:'<circle cx="70" cy="75" r="55" fill="'+c+'" opacity=".15"/><circle cx="70" cy="72" r="48" fill="'+c+'"/><ellipse cx="70" cy="130" rx="42" ry="18" fill="'+a+'" opacity=".2"/>', accessory:'<text x="70" y="78" text-anchor="middle" font-size="44">🍖</text>', cheek:'#fde68a'},
    carb:  {body:'<circle cx="70" cy="75" r="55" fill="'+c+'" opacity=".15"/><circle cx="70" cy="72" r="48" fill="'+c+'"/><ellipse cx="70" cy="130" rx="42" ry="18" fill="'+a+'" opacity=".2"/>', accessory:'<text x="70" y="78" text-anchor="middle" font-size="44">🍜</text>', cheek:'#fef08a'},
    sweet: {body:'<circle cx="70" cy="75" r="55" fill="'+c+'" opacity=".12"/><circle cx="70" cy="72" r="48" fill="'+c+'"/><ellipse cx="70" cy="130" rx="42" ry="18" fill="'+a+'" opacity=".2"/>', accessory:'<text x="70" y="78" text-anchor="middle" font-size="44">🍰</text>', cheek:'#fbcfe8'},
    globe: {body:'<circle cx="70" cy="75" r="55" fill="'+c+'" opacity=".12"/><circle cx="70" cy="72" r="48" fill="'+c+'"/><ellipse cx="70" cy="130" rx="42" ry="18" fill="'+a+'" opacity=".2"/>', accessory:'<text x="70" y="78" text-anchor="middle" font-size="42">🌍</text>', cheek:'#ddd6fe'},
  };
  const tf = typeFeatures[typeKey];

  // Eyes & mouth per personality
  let eyes='', mouth='', extra='';
  switch(persKey) {
    case 'radical':
      eyes = '<ellipse cx="52" cy="68" rx="7" ry="7" fill="#1c1917"/><ellipse cx="88" cy="68" rx="7" ry="7" fill="#1c1917"/><ellipse cx="52" cy="66" rx="3.5" ry="3.5" fill="#fff"/><ellipse cx="88" cy="66" rx="3.5" ry="3.5" fill="#fff"/><line x1="42" y1="58" x2="56" y2="60" stroke="#1c1917" stroke-width="3.5" stroke-linecap="round"/><line x1="84" y1="60" x2="98" y2="58" stroke="#1c1917" stroke-width="3.5" stroke-linecap="round"/>';
      mouth = '<path d="M52 92 Q70 108 88 92" fill="none" stroke="#1c1917" stroke-width="3" stroke-linecap="round"/>';
      extra = '<text x="94" y="58" font-size="18">⚡</text>';
      break;
    case 'scholar':
      eyes = '<ellipse cx="52" cy="68" rx="6" ry="6.5" fill="#1c1917"/><ellipse cx="88" cy="68" rx="6" ry="6.5" fill="#1c1917"/><ellipse cx="51" cy="66" rx="2.5" ry="2.5" fill="#fff"/><ellipse cx="87" cy="66" rx="2.5" ry="2.5" fill="#fff"/>';
      mouth = '<path d="M56 93 Q70 100 84 93" fill="none" stroke="#1c1917" stroke-width="2.5" stroke-linecap="round"/>';
      extra = '<rect x="42" y="60" width="20" height="11" rx="5" fill="none" stroke="#1c1917" stroke-width="2.5"/><rect x="78" y="60" width="20" height="11" rx="5" fill="none" stroke="#1c1917" stroke-width="2.5"/><line x1="62" y1="65" x2="78" y2="65" stroke="#1c1917" stroke-width="1.5"/><text x="42" y="88" font-size="14">🔍</text>';
      break;
    case 'social':
      eyes = '<ellipse cx="52" cy="67" rx="6" ry="7" fill="#1c1917"/><ellipse cx="88" cy="67" rx="6" ry="7" fill="#1c1917"/><ellipse cx="50" cy="65" rx="3.5" ry="3.5" fill="#fff"/><ellipse cx="86" cy="65" rx="3.5" ry="3.5" fill="#fff"/><circle cx="90" cy="65" r="2.5" fill="#fff" opacity=".8"/><circle cx="92" cy="63" r="1.5" fill="#fff" opacity=".6"/>';
      mouth = '<path d="M54 92 Q70 108 86 92" fill="none" stroke="#1c1917" stroke-width="3" stroke-linecap="round"/>';
      extra = '<text x="50" y="55" font-size="16">✨</text><text x="90" y="55" font-size="16">✨</text><circle cx="42" cy="72" r="8" fill="#fca5a5" opacity=".5"/><circle cx="98" cy="72" r="8" fill="#fca5a5" opacity=".5"/>';
      break;
    case 'zen':
      eyes = '<path d="M44 68 Q52 62 60 68" fill="none" stroke="#1c1917" stroke-width="3" stroke-linecap="round"/><path d="M80 68 Q88 62 96 68" fill="none" stroke="#1c1917" stroke-width="3" stroke-linecap="round"/>';
      mouth = '<path d="M56 94 Q70 102 84 94" fill="none" stroke="#1c1917" stroke-width="2.5" stroke-linecap="round"/>';
      extra = '<text x="56" y="50" font-size="14">☁️</text><text x="84" y="50" font-size="14">☁️</text>';
      break;
  }

  return `<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id="grad" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="${b}"/><stop offset="100%" stop-color="${c}" stop-opacity=".15"/></radialGradient></defs>
    <rect width="140" height="140" fill="url(#grad)" rx="60"/>
    ${tf.body}
    ${extra}
    ${eyes}
    ${mouth}
    ${tf.accessory}
  </svg>`;
}

// ============ GAME STATE ============
let typeScores = {spicy:0,fresh:0,meat:0,carb:0,sweet:0,globe:0};
let persScores = {radical:0,scholar:0,social:0,zen:0};
let currentQ = 0;
const TQ = QUESTIONS.length;

const $=id=>document.getElementById(id);
function showSc(id){
  ['welcome','quiz','loading','result'].forEach(s=>$('sc-'+s).classList.remove('active'));
  $('sc-'+id).classList.add('active');
}

function toast(m){
  const t=$('toast');t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function confetti(){
  const wrap=$('confetti');wrap.innerHTML='';
  const emojis=['🍕','🍔','🌮','🍣','🍩','🧁','🍜','🌶️','🍖','🍰','🧋','🍪','🥟','🍿','🍦','🥐'];
  for(let i=0;i<40;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.left=Math.random()*100+'%';
    p.style.top=-(Math.random()*30+10)+'px';
    p.style.fontSize=(16+Math.random()*20)+'px';
    p.textContent=emojis[i%emojis.length];
    p.style.animationDelay=Math.random()*1.2+'s';
    p.style.animationDuration=(1.5+Math.random()*1.5)+'s';
    wrap.appendChild(p);
  }
}

// ============ START ============
function start(){
  typeScores={spicy:0,fresh:0,meat:0,carb:0,sweet:0,globe:0};
  persScores={radical:0,scholar:0,social:0,zen:0};
  currentQ=0;
  showSc('quiz');
  $('progress-bar').style.display='block';
  renderQ();
}

// ============ RENDER QUESTION ============
function renderQ(){
  const q=QUESTIONS[currentQ];
  $('pf').style.width=((currentQ+1)/TQ*100)+'%';
  $('pt').textContent=(currentQ+1)+' / '+TQ;
  $('qn').textContent='第'+(currentQ+1)+'题';
  $('qt').textContent=q.q;
  const cont=$('qo');cont.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt-btn';
    b.style.animation='fadeIn .35s ease '+i*.07+'s both';
    b.innerHTML='<span class="opt-emoji">'+o.e+'</span><span class="opt-label">'+o.t+'</span>';
    b.onclick=()=>select(o.tk,o.pk,b);
    cont.appendChild(b);
  });
  $('qc').style.animation='none';
  requestAnimationFrame(()=>{$('qc').style.animation='fadeIn .3s ease'});
}

function select(tk,pk,btn){
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  btn.classList.add('selected');
  typeScores[tk]++;persScores[pk]++;
  setTimeout(()=>{
    currentQ++;
    if(currentQ<TQ) renderQ();else showResult();
  },350);
}

// ============ SHOW RESULT ============
function showResult(){
  showSc('loading');$('progress-bar').style.display='none';
  const lts=['扫描外卖订单记录…','分析辣椒素耐受力…','计算奶茶含糖量曲线…','评估碳水摄入模式…','比对国际美食频率…','鉴定吃货人格中…'];
  let i=0;const iv=setInterval(()=>{$('lt').textContent=lts[i=(i+1)%lts.length]},700);

  setTimeout(()=>{
    clearInterval(iv);
    let bestT='spicy',bestS=0;
    for(const[k,v]of Object.entries(typeScores)){if(v>bestS){bestS=v;bestT=k}}
    const tiesT=Object.entries(typeScores).filter(([,v])=>v===bestS).map(([k])=>k);
    const topT=tiesT[Math.floor(Math.random()*tiesT.length)];

    let bestP='radical';bestS=0;
    for(const[k,v]of Object.entries(persScores)){if(v>bestS){bestS=v;bestP=k}}
    const tiesP=Object.entries(persScores).filter(([,v])=>v===bestS).map(([k])=>k);
    const topP=tiesP[Math.floor(Math.random()*tiesP.length)];

    const key=topT+'_'+topP;
    const r=RESULTS[key]||RESULTS[topT+'_zen'];
    renderResult(topT,topP,r);
    showSc('result');
    confetti();
  },2000);
}

function renderResult(tk,pk,r){
  const tm=TYPE_META[tk],pm=PERS_META[pk];
  const tags=r.cuisines.split(' ').map(c=>'<span class="cuisine-tag">'+c+'</span>').join('');
  $('rc').innerHTML=`
    <div class="res-avatar">${makeSvg(tk,pk)}</div>
    <div class="res-name">${r.title}</div>
    <div class="res-tag">${r.tag}</div>
    <div class="res-desc">${r.desc}</div>
    <div class="res-cuisines">${tags}</div>
    <div class="res-quote">「${r.quote}」</div>
    <div style="margin-top:12px;font-size:12px;color:#a8a29e">${tm.name} × ${pm.name} ${pm.emoji}</div>
    <div class="btn-group">
      <button class="btn btn-restart" onclick="start()">🔄 再测一次</button>
      <button class="btn btn-share" onclick="shareRes('${tk}','${pk}')">📤 分享结果</button>
    </div>`;
}

// ============ SHARE ============
function shareRes(tk,pk){
  const key=tk+'_'+pk;
  const r=RESULTS[key]||RESULTS[tk+'_zen'];
  const txt='🍽️ 我是【'+r.title+'】——'+r.tag+'\n\n「'+r.quote+'」\n\n测测你是哪种吃货？24种人格等你来鉴定！';
  const url=window.location.href.split('?')[0];
  if(navigator.share){navigator.share({title:'你是哪种吃货？',text:txt,url}).catch(()=>{})}
  else{
    const full=txt+'\n'+url;
    if(navigator.clipboard){navigator.clipboard.writeText(full).then(()=>toast('✅ 文案已复制，发给朋友吧！'))}
    else{const ta=document.createElement('textarea');ta.value=full;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('✅ 文案已复制，发给朋友吧！')}
  }
}
</script>
</body>
