function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Route to art style based on food type
function makeSvg(typeKey, persKey) {
  const tm = TYPE_META[typeKey];
  const pm = PERS_META[persKey];
  switch(typeKey) {
    case 'fresh': return makeAnime80s(tm, pm);
    case 'sweet': return makeGhibli(tm, pm);
    case 'carb':  return makeMsPaint(tm, pm);
    case 'globe': return makeCyber(tm, pm);
    default:      return makeDefault(tm, pm);
  }
}

    ${mouth}
    <!-- cyber nose -->
    <polygon points="68,72 72,72 70,78" fill="${a}" opacity=".4"/>
    ${hud}
    <!-- circuit lines from face -->
    <line x1="28" y1="72" x2="15" y2="72" stroke="${a}" stroke-width="1" opacity=".5"/>
    <line x1="112" y1="72" x2="125" y2="72" stroke="${a}" stroke-width="1" opacity=".5"/>
    <circle cx="15" cy="72" r="2" fill="${a}" opacity=".6"/>
    <circle cx="125" cy="72" r="2" fill="${a}" opacity=".6"/>
    <!-- globe emoji with neon frame -->
    <text x="50" y="125" font-size="30" filter="url(#glow)">рҹҢҚ</text>
  </svg>`;
}

// =========== GAME STATE ===========
let typeScores = {spicy:0,fresh:0,meat:0,carb:0,sweet:0,globe:0,easy:0};
let persScores = {radical:0,scholar:0,social:0,zen:0};
let answerHistory = [];
let currentQ = 0;
const TQ = QUESTIONS.length;

const $ = id => document.getElementById(id);
function showSc(id){
  ['welcome','quiz','loading','result'].forEach(s => $('sc-'+s).classList.remove('active'));
  $('sc-'+id).classList.add('active');
}
function toast(m){
  const t = $('toast'); t.textContent = m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function confetti(){
  const wrap = $('confetti'); wrap.innerHTML = '';
  const emojis = ['рҹҚ•','рҹҚ”','рҹҢ®','рҹҚЈ','рҹҚ©','рҹ§Ғ','рҹҚң','рҹҢ¶пёҸ','рҹҚ–','рҹҚ°','рҹ§Ӣ','рҹҚӘ','рҹҘҹ','рҹҚҝ','рҹҚҰ','рҹҘҗ'];
  for(let i=0;i<40;i++){
    const p = document.createElement('div'); p.className = 'confetti-piece';
    p.style.left = Math.random()*100+'%';
    p.style.top = -(Math.random()*30+10)+'px';
    p.style.fontSize = (14+Math.random()*18)+'px';
    p.textContent = emojis[i%emojis.length];
    p.style.animationDelay = Math.random()*1.2+'s';
    p.style.animationDuration = (1.5+Math.random()*1.5)+'s';
    wrap.appendChild(p);
  }
}

// =========== START ===========
function start(){
  typeScores = {spicy:0,fresh:0,meat:0,carb:0,sweet:0,globe:0,easy:0};
  persScores = {radical:0,scholar:0,social:0,zen:0};
  answerHistory = [];
  currentQ = 0;
  // жҜҸйўҳйҮҚж–°жҙ—зүҢпјҢзЎ®дҝқжҜҸж¬ЎжөӢиҜ•зӯ”жЎҲйЎәеәҸйғҪдёҚеӣәе®ҡ
  QUESTIONS.forEach(q => shuffle(q.opts));
  showSc('quiz');
  $('progress-bar').style.display = 'block';
  renderQ();
}

// =========== RENDER QUESTION ===========
function renderQ(){
  const q = QUESTIONS[currentQ];
  $('pf').style.width = ((currentQ+1)/TQ*100)+'%';
  $('pt').textContent = (currentQ+1)+' / '+TQ;
  $('qn').textContent = 'з¬¬'+(currentQ+1)+'йўҳ';
  $('qt').textContent = q.q;
  // Show/hide previous button
  $('btn-prev').style.visibility = currentQ > 0 ? 'visible' : 'hidden';
  const cont = $('qo'); cont.innerHTML = '';
  const prevAns = answerHistory[currentQ];
  q.opts.forEach((o,i) => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.style.animation = 'fadeIn .35s ease '+i*0.07+'s both';
    b.innerHTML = '<span class="opt-emoji">'+o.e+'</span><span class="opt-label">'+o.t+'</span>';
    if(prevAns && prevAns.tk === o.tk && prevAns.pk === o.pk) {
      b.classList.add('selected');
    }
    b.onclick = () => select(o.tk,o.pk,b);
    cont.appendChild(b);
  });
  $('qc').style.animation = 'none';
  requestAnimationFrame(() => { $('qc').style.animation = 'fadeIn .3s ease' });
}
function select(tk,pk,btn){
  // If this question was already answered, reverse the old answer
  const prev = answerHistory[currentQ];
  if(prev) {
    typeScores[prev.tk]--; persScores[prev.pk]--;
  }
  // Record new answer
  answerHistory[currentQ] = {tk, pk};
  typeScores[tk]++; persScores[pk]++;
  // Update UI
  document.querySelectorAll('.opt-btn').forEach(b => { b.classList.remove('selected'); b.disabled = true; });
  btn.classList.add('selected');
  setTimeout(()=>{
    currentQ++;
    if(currentQ < TQ) renderQ(); else showResult();
  },350);
}

// =========== PREVIOUS QUESTION ===========
function prevQ(){
  if(currentQ <= 0) return;
  currentQ--;
  renderQ();
}

// =========== SHOW RESULT ===========
function showResult(){
  showSc('loading'); $('progress-bar').style.display = 'none';
  const lts = ['жү«жҸҸеӨ–еҚ–и®ўеҚ•и®°еҪ•вҖҰ','еҲҶжһҗе‘іи§үеҹәеӣ вҖҰ','и®Ўз®—еҘ¶иҢ¶еҗ«зі–йҮҸвҖҰ','иҜ„дј°зўіж°ҙж‘„е…ҘжЁЎејҸвҖҰ','жҜ”еҜ№еӣҪйҷ…зҫҺйЈҹйў‘зҺҮвҖҰ','йүҙе®ҡеҗғиҙ§дәәж јдёӯвҖҰ'];
  let i = 0; const iv = setInterval(()=>{ $('lt').textContent = lts[i=(i+1)%lts.length] },700);

  setTimeout(()=>{
    clearInterval(iv);
    let bestT='spicy', bestS=0;
    for(const [k,v] of Object.entries(typeScores)){ if(v>bestS){ bestS=v; bestT=k } }
    const tiesT = Object.entries(typeScores).filter(([,v])=>v===bestS).map(([k])=>k);
    const topT = tiesT[Math.floor(Math.random()*tiesT.length)];

    let bestP='radical', bestS2=0;
    for(const [k,v] of Object.entries(persScores)){ if(v>bestS2){ bestS2=v; bestP=k } }
    const tiesP = Object.entries(persScores).filter(([,v])=>v===bestS2).map(([k])=>k);
    const topP = tiesP[Math.floor(Math.random()*tiesP.length)];

    const key = topT+'_'+topP;
    const r = RESULTS[key] || RESULTS[topT+'_zen'] || RESULTS['easy_zen'];
    renderResult(topT,topP,r);
    showSc('result');
    confetti();
  },2000);
}

function renderResult(tk,pk,r){
  const tm = TYPE_META[tk], pm = PERS_META[pk];
  const tags = r.cuisines.split(' ').map(c => '<span class="cuisine-tag">'+c+'</span>').join('');
  $('rc').innerHTML = `
    <div class="res-hero">
      <img class="res-hero-img" src="${AVATAR_IMG[tk+'+'+pk] || AVATAR_IMG[tk] || AVATAR_IMG.easy}" alt="${tm.name}">
      <div class="res-hero-fade"></div>
    </div>
    <div class="res-card">
    <div class="res-name">${r.title}</div>
    <div class="res-tag">${r.tag}</div>
    <div class="res-desc">${r.desc}</div>
    <div class="res-cuisines">${tags}</div>
    <div class="res-quote">гҖҢ${r.quote}гҖҚ</div>
    <div style="margin-top:12px;font-size:12px;color:#a8a29e">${tm.name} Г— ${pm.name} ${pm.emoji}</div>
    <div class="btn-group">
      <button class="btn btn-restart" onclick="start()">рҹ”„ еҶҚжөӢдёҖж¬Ў</button>
      <button class="btn btn-share" onclick="shareRes('${tk}','${pk}')">рҹ“Ө еҲҶдә«з»“жһң</button>
    </div>
    <button class="btn btn-linkcopy" onclick="copyLinkOnly()">рҹ”— еӨҚеҲ¶й“ҫжҺҘпјҲеҸ‘иҒҠеӨ©еҸҜжҳҫзӨәеҚЎзүҮйў„и§Ҳпјү</button>
    </div>`;
}

// =========== SHARE (URL separated from text for link card preview) ===========
const QUIZ_URL = 'https://msdodofee.github.io/foodie-quiz/';
function shareRes(tk,pk){
  const key = tk+'_'+pk;
  const r = RESULTS[key] || RESULTS[tk+'_zen'] || RESULTS['easy_zen'];
  const txt = `рҹҚҪпёҸ жҲ‘жҳҜгҖҗ${r.title}гҖ‘вҖ”вҖ”${r.tag}\nгҖҢ${r.quote}гҖҚ\nеҝ«жқҘжөӢжөӢдҪ жҳҜе“Әз§Қеҗғиҙ§пјҒ`;
  if(navigator.share){
    // Pass URL separately so platforms can generate link card from OG tags
    navigator.share({title:'дҪ жҳҜе“Әз§Қеҗғиҙ§пјҹ',text:txt,url:QUIZ_URL}).catch(()=>{});
  } else {
    // Fallback: copy text + URL
    const fullTxt = txt + '\nрҹ‘ү ' + QUIZ_URL;
    copyToClipboard(fullTxt);
    toast('вң… ж–ҮжЎҲе·ІеӨҚеҲ¶пјҢеҸ‘з»ҷжңӢеҸӢеҗ§пјҒ');
  }
}

function copyLinkOnly(){
  copyToClipboard(QUIZ_URL);
  toast('вң… й“ҫжҺҘе·ІеӨҚеҲ¶пјҒзІҳиҙҙеҲ°иҒҠеӨ©дёӯеҸҜжҳҫзӨәеҚЎзүҮйў„и§Ҳ');
}

function copyToClipboard(text){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).catch(()=>fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}
</script>
</body>
